- title: Selected Academic Projects
  type: list
  contents:
    - "Precoding with reduced CSI in RIS-aided MIMO: Studied precoding strategies for RIS-assisted MIMO systems under limited CSI using convex optimization."
    - "Proactive eavesdropping in RIS-assisted communications: Developed optimization-based methods for proactive eavesdropping using alternating optimization and semidefinite relaxation."
    - "Music genre classification and clustering: Built a dataset of Persian songs, extracted features, and performed supervised and unsupervised learning for music genre analysis."
    - "Low-complexity non-convex optimization: Designed an RL-based algorithm to solve non-convex optimization problems in RIS-aided communications and compared it with conventional methods."
    - "Simulation of signal processing papers: Reproduced results on semi-blind channel estimation and adaptive beamforming using MATLAB simulations."
    - "Smart restaurant model: Designed a prototype with a website, RFID-based entry, database-backed ordering, and a customer notification pipeline."
    - "Detection and demodulation of digital video broadcasting terrestrial signals: Implemented demodulation, error correction, and decompression with software defined radio."
    - "Network design: Designed and simulated network architectures with VLANs, spanning tree, subnetting, trunking, FTP, and OSPF routing in Cisco Packet Tracer."

