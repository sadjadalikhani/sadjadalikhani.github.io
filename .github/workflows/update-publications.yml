name: Update Publications

on:
  schedule:
    - cron: '0 9 * * *'   # every day at 9:00 AM UTC
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install requests

      - name: Run publication updater
        run: python3 _scripts/update_publications.py

      - name: Commit updated files
        id: commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add _bibliography/papers.bib assets/json/resume.json
          if git diff --staged --quiet; then
            echo "No new publications."
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            git commit -m "publications: auto-update from Semantic Scholar $(date +%Y-%m-%d)"
            git push
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Trigger CV recompile
        if: steps.commit.outputs.changed == 'true'
        run: |
          curl -X POST \
            -H "Authorization: Bearer ${{ secrets.GH_PAT }}" \
            -H "Accept: application/vnd.github.v3+json" \
            https://api.github.com/repos/sadjadalikhani/cv-latex/actions/workflows/compile-cv.yml/dispatches \
            -d '{"ref":"main"}'
