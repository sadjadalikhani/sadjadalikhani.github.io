name: Update Publications

on:
  schedule:
    - cron: '0 9 * * *'   # every day at 9:00 AM UTC
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install requests

      - name: Run publication updater
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          GH_PAT: ${{ secrets.GH_PAT }}
        run: python3 _scripts/update_publications.py

      - name: Commit updated files to website repo
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add _bibliography/papers.bib assets/json/resume.json
          git diff --staged --quiet && echo "No new publications." && exit 0
          git commit -m "publications: auto-update from Semantic Scholar $(date +%Y-%m-%d)"
          git push
